<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Вход — BrainPulse</title>
<link rel="stylesheet" href="css/landing.css">
<link rel="stylesheet" href="css/auth.css">
</head>
<body>
<nav class="nav">
  <div class="container nav-inner">
    <a href="index.html" class="logo"><span class="logo-dot"></span>BrainPulse</a>
    <a href="index.html" class="nav-cta">← На главную</a>
  </div>
</nav>

<div class="auth-wrap">
  <div class="auth-card reveal">
    <div class="auth-tabs">
      <button class="auth-tab active" data-tab="login">Вход</button>
      <button class="auth-tab" data-tab="register">Регистрация</button>
    </div>
    
    <div class="auth-pane" id="loginPane">
      <h2>С возвращением</h2>
      <p class="auth-sub">Войди, чтобы не потерять прогресс</p>
      <form id="loginForm">
        <label>
          <span>Email</span>
          <input type="email" name="email" required placeholder="you@example.com">
        </label>
        <label>
          <span>Пароль</span>
          <input type="password" name="password" required placeholder="••••••••" minlength="6">
        </label>
        <div class="auth-error" id="loginError"></div>
        <button type="submit" class="btn btn-primary auth-submit">Войти →</button>
      </form>
    </div>
    
    <div class="auth-pane" id="registerPane" style="display:none">
      <h2>Создать аккаунт</h2>
      <p class="auth-sub">30 секунд — и ты в игре</p>
      <form id="registerForm">
        <label>
          <span>Имя</span>
          <input type="text" name="name" required placeholder="Алексей" minlength="2" maxlength="20">
        </label>
        <label>
          <span>Email</span>
          <input type="email" name="email" required placeholder="you@example.com">
        </label>
        <label>
          <span>Пароль</span>
          <input type="password" name="password" required placeholder="Минимум 6 символов" minlength="6">
        </label>
        <div class="auth-error" id="registerError"></div>
        <button type="submit" class="btn btn-primary auth-submit">Зарегистрироваться ⚡</button>
      </form>
    </div>
    
    <div class="auth-footer">
      <p>Регистрируясь, ты соглашаешься не удалять аккаунт после первой тренировки 😏</p>
    </div>
  </div>
</div>

<script src="js/utils.js"></script>
<script src="js/api.js"></script>
<script src="js/auth.js"></script>
</body>
</html>
