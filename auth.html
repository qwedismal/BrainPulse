<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#0a0a0f">
<title>Вход — BrainPulse</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link rel="stylesheet" href="css/variables.css">
<link rel="stylesheet" href="css/reset.css">
<link rel="stylesheet" href="css/main.css">
<link rel="stylesheet" href="css/landing.css">

<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">

<style>
  /* === AUTH PAGE STYLES === */
  .auth-wrap {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 120px 20px 40px;
    position: relative;
  }

  .auth-card {
    width: 100%;
    max-width: 420px;
    background: #12121a;
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 32px;
    padding: 40px 32px;
    position: relative;
    overflow: hidden;
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    opacity: 1 !important;
    transform: none !important;
  }

  .auth-card::before {
    content: "";
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 3px;
    background: linear-gradient(90deg, #FF6B00, #0088FF, #00CC66, #9B59B6);
  }

  .auth-tabs {
    display: flex;
    gap: 8px;
    margin-bottom: 28px;
    background: #0a0a0f;
    padding: 4px;
    border-radius: 100px;
  }

  .auth-tab {
    flex: 1;
    padding: 10px;
    border-radius: 100px;
    font-weight: 600;
    font-size: 14px;
    color: #9a9aa8;
    transition: all .2s;
    cursor: pointer;
    background: transparent;
    border: none;
  }

  .auth-tab.active {
    background: #ffffff;
    color: #000000;
  }

  .auth-pane {
    width: 100%;
  }

  .auth-card h2 {
    font-family: 'Montserrat', system-ui, sans-serif;
    font-size: 28px;
    font-weight: 800;
    margin-bottom: 8px;
    color: #f5f5f7;
    line-height: 1.2;
  }

  .auth-sub {
    color: #9a9aa8;
    font-size: 14px;
    margin-bottom: 28px;
    line-height: 1.5;
  }

  .auth-card label {
    display: block;
    margin-bottom: 18px;
  }

  .auth-card label span {
    display: block;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: #5a5a6a;
    margin-bottom: 6px;
    font-family: 'JetBrains Mono', monospace;
    font-weight: 500;
  }

  .auth-card input {
    width: 100%;
    padding: 14px 16px;
    background: #0a0a0f;
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 8px;
    font-size: 16px;
    color: #f5f5f7;
    transition: border-color .2s, background .2s;
    box-sizing: border-box;
    -webkit-appearance: none;
    appearance: none;
  }

  .auth-card input::placeholder {
    color: #5a5a6a;
  }

  .auth-card input:focus {
    border-color: #FF6B00;
    background: rgba(255,107,0,0.03);
    outline: none;
  }

  .auth-submit {
    width: 100%;
    justify-content: center;
    margin-top: 8px;
    padding: 16px;
    font-size: 15px;
  }

  .auth-submit:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }

  .auth-error {
    color: #FF3366;
    font-size: 13px;
    margin-top: -8px;
    margin-bottom: 16px;
    min-height: 18px;
    font-family: 'JetBrains Mono', monospace;
  }

  .auth-footer {
    margin-top: 20px;
    padding-top: 20px;
    border-top: 1px solid rgba(255,255,255,0.08);
    text-align: center;
    color: #5a5a6a;
    font-size: 12px;
    line-height: 1.6;
  }

  .auth-footer .accent-text {
    color: #FF6B00;
  }

  @media (max-width: 480px) {
    .auth-wrap { padding: 100px 16px 30px; }
    .auth-card { padding: 32px 24px; border-radius: 22px; }
    .auth-card h2 { font-size: 24px; }
    .auth-card input { padding: 13px 14px; }
  }
</style>
</head>
<body>

<nav class="nav">
  <div class="container nav-inner">
    <a href="index.html" class="logo"><span class="logo-dot"></span>BrainPulse</a>
    <a href="index.html" class="nav-cta">← На главную</a>
  </div>
</nav>

<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-tabs">
      <button type="button" class="auth-tab active" data-tab="login">Вход</button>
      <button type="button" class="auth-tab" data-tab="register">Регистрация</button>
    </div>
    
    <div class="auth-pane" id="loginPane">
      <h2>С возвращением</h2>
      <p class="auth-sub">Войди, чтобы не потерять прогресс</p>
      <form id="loginForm" autocomplete="on">
        <label>
          <span>Email</span>
          <input type="email" name="email" required placeholder="you@example.com" autocomplete="email">
        </label>
        <label>
          <span>Пароль</span>
          <input type="password" name="password" required placeholder="••••••••" minlength="6" autocomplete="current-password">
        </label>
        <div class="auth-error" id="loginError"></div>
        <button type="submit" class="btn btn-primary auth-submit">Войти →</button>
      </form>
    </div>
    
    <div class="auth-pane" id="registerPane" style="display:none">
      <h2>Создать аккаунт</h2>
      <p class="auth-sub">30 секунд — и ты в игре</p>
      <form id="registerForm" autocomplete="on">
        <label>
          <span>Имя</span>
          <input type="text" name="name" required placeholder="Алексей" minlength="2" maxlength="20" autocomplete="name">
        </label>
        <label>
          <span>Email</span>
          <input type="email" name="email" required placeholder="you@example.com" autocomplete="email">
        </label>
        <label>
          <span>Пароль</span>
          <input type="password" name="password" required placeholder="Минимум 6 символов" minlength="6" autocomplete="new-password">
        </label>
        <div class="auth-error" id="registerError"></div>
        <button type="submit" class="btn btn-primary auth-submit">Зарегистрироваться ⚡</button>
      </form>
    </div>
    
    <div class="auth-footer">
      Регистрируясь, ты соглашаешься не удалять аккаунт после первой тренировки 😏<br>
      <span class="accent-text">Без регистрации всё работает — данные хранятся в браузере</span>
    </div>
  </div>
</div>

<script src="js/utils.js"></script>
<script src="js/api.js"></script>
<script src="js/auth.js"></script>
</body>
</html>
