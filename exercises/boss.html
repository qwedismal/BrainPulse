<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Босс дня — BrainPulse</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="../css/variables.css">
<link rel="stylesheet" href="../css/reset.css">
<link rel="stylesheet" href="../css/main.css">
<link rel="stylesheet" href="../css/exercise.css">
</head>
<body>
<nav class="nav"><div class="container nav-inner"><a href="../index.html" class="logo"><span class="logo-dot"></span>BrainPulse</a><a href="../trainer.html" class="nav-cta">← В кабинет</a></div></nav>
<div class="container exercise-shell">
  <div class="ex-topbar">
    <div class="ex-title"><span class="pill" style="background:linear-gradient(135deg,#FF0040,#FF6B00)">⚔️ БОСС ДНЯ</span><h1>Ежедневный вызов</h1></div>
    <div class="ex-stats">
      <div class="st timer"><span class="lbl">⏱ Время</span><span class="val" id="time">1:00</span></div>
      <div class="st"><span class="lbl">Твоё HP</span><span class="val" id="hp">100</span></div>
    </div>
  </div>
  <div class="play-area"><div id="problem-area" style="width:100%"></div></div>
  <div class="controls">
    <button class="ctrl-btn primary" id="startBtn">⚔️ В БОЙ!</button>
  </div>
</div>
<div class="result-modal" id="resultModal">
  <div class="result-box">
    <div class="result-score" id="resReward" style="background:linear-gradient(135deg,#FFD700,#FF6B00);-webkit-background-clip:text;background-clip:text;color:transparent">+0 XP</div>
    <div class="result-label" id="resLabel">Босс</div>
    <div class="result-vs" id="resVs"></div>
    <div class="result-actions">
      <button class="btn btn-primary" id="againBtn">⚔️ Завтра новый</button>
      <a href="../trainer.html" class="btn btn-ghost">В кабинет</a>
    </div>
  </div>
</div>
<script src="../js/utils.js"></script>
<script src="../js/storage.js"></script>
<script src="../js/sound.js"></script>
<script src="../js/api.js"></script>
<script src="../js/exercises/boss.js"></script>
</body>
</html>
