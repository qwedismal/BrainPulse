<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#0a0a0f">
<title>Шахматы — BrainPulse</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="../css/variables.css">
<link rel="stylesheet" href="../css/reset.css">
<link rel="stylesheet" href="../css/main.css">
<link rel="stylesheet" href="../css/exercise.css"><link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>♟️</text></svg>">
<style>
body {
  --ec: #e6e6e6;
}
</style>
</head>
<body>
<nav class="nav">
  <div class="container nav-inner">
    <a href="../index.html" class="logo"><span class="logo-dot"></span>BrainPulse</a>
    <a href="../trainer.html" class="nav-cta">← В кабинет</a>
  </div>
</nav>

<div class="container exercise-shell">
  <div class="ex-topbar">
    <div class="ex-title">
      <span class="pill" style="background:#e6e6e6;color:#000">♟️ Шахматы</span>
      <h1>Тактические задачи</h1>
    </div>
    <div class="ex-stats">
      <div class="st timer"><span class="lbl">⏱ Время</span><span class="val" id="time">5:00</span></div>
      <div class="st"><span class="lbl">Рекорд</span><span class="val" id="record">0</span></div>
      <div class="st"><span class="lbl">Счёт</span><span class="val" id="score">0</span></div>
    </div>
  </div>
  <div class="play-area" id="play">
    <div id="problem-area" style="width:100%;text-align:center"></div>
  </div>
  <div class="controls">
    <button class="ctrl-btn primary" id="startBtn">▶ Старт</button>
    <button class="ctrl-btn danger" id="stopBtn" disabled>■ Стоп</button>
  </div>
</div>

<div class="result-modal" id="resultModal">
  <div class="result-box">
    <div class="result-score" id="resScore">0</div>
    <div class="result-label">задач решено</div>
    <div class="result-vs" id="resVs"></div>
    <div class="result-actions">
      <button class="btn btn-primary" id="againBtn">♟️ Ещё раз</button>
      <a href="../trainer.html" class="btn btn-ghost">В кабинет</a>
    </div>
  </div>
</div>

<script src="../js/utils.js"></script>
<script src="../js/storage.js"></script>
<script src="../js/sound.js"></script>
<script src="../js/api.js"></script>
<script src="../js/exercises/chess.js"></script>
</body>
</html>
