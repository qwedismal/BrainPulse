<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Лидерборд — BrainPulse</title>
<link rel="stylesheet" href="css/landing.css">
<link rel="stylesheet" href="css/mobile/critical.css">
<link rel="stylesheet" href="css/variables.css">
<link rel="stylesheet" href="css/reset.css">
<link rel="stylesheet" href="css/main.css">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">
<style>
.lb-shell{padding:120px 0 80px;min-height:100vh}
.lb-head{text-align:center;margin-bottom:48px}
.lb-tabs{
  display:flex;gap:6px;justify-content:center;flex-wrap:wrap;margin-bottom:32px;
  padding:0 12px;
}
.lb-tab{
  padding:8px 16px;background:var(--bg-elev-1);border:1px solid var(--border);
  border-radius:100px;font-weight:600;font-size:13px;cursor:pointer;
  transition:all .2s;white-space:nowrap;
}
.lb-tab:hover{border-color:var(--border-hover)}
.lb-tab.active{background:var(--text-primary);color:#000;border-color:var(--text-primary)}
.lb-list{
  display:flex;flex-direction:column;gap:8px;
  max-width:800px;margin:0 auto;padding:0 16px;
}
.lb-row{
  display:grid;
  grid-template-columns:50px 1fr auto;
  gap:16px;
  align-items:center;
  padding:16px 20px;
  background:var(--bg-elev-1);
  border:1px solid var(--border);
  border-radius:var(--r-md);
  transition:all .3s;
}
.lb-row:hover{transform:translateX(4px);border-color:var(--border-hover)}
.lb-row.me{
  background:linear-gradient(135deg,rgba(255,107,0,0.1),rgba(0,136,255,0.1));
  border-color:var(--c-acc);
}
.lb-row.top-1{
  background:linear-gradient(135deg,rgba(255,215,0,0.15),rgba(255,107,0,0.1));
  border-color:#FFD700;
}
.lb-row.top-2{
  background:linear-gradient(135deg,rgba(192,192,192,0.15),rgba(160,160,160,0.05));
  border-color:#C0C0C0;
}
.lb-row.top-3{
  background:linear-gradient(135deg,rgba(205,127,50,0.15),rgba(139,69,19,0.05));
  border-color:#CD7F32;
}
.lb-rank{
  font-family:var(--font-head);font-size:20px;font-weight:900;text-align:center
}
.lb-user{display:flex;align-items:center;gap:12px;min-width:0}
.lb-avatar{
  width:38px;height:38px;border-radius:50%;
  background:linear-gradient(135deg,var(--c-acc),var(--c-exp));
  display:flex;align-items:center;justify-content:center;
  font-weight:800;color:#fff;font-size:14px;flex-shrink:0;
}
.lb-info{min-width:0;flex:1}
.lb-username{font-weight:700;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lb-meta{font-size:11px;color:var(--text-muted);font-family:var(--font-mono)}
.lb-score{
  font-family:var(--font-head);font-size:22px;font-weight:900;
  color:var(--c-acc);text-align:right;flex-shrink:0;
}
.lb-loading,.lb-empty{
  text-align:center;padding:60px 20px;color:var(--text-muted);
  font-family:var(--font-mono);font-size:14px;
}
.lb-stats-card{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
  gap:12px;
  max-width:800px;margin:0 auto 32px;padding:0 16px;
}
.lb-stat-card{
  padding:18px 16px;background:var(--bg-elev-1);
  border:1px solid var(--border);border-radius:var(--r-md);text-align:center;
}
.lb-stat-card h4{
  font-size:10px;color:var(--text-muted);text-transform:uppercase;
  letter-spacing:0.15em;margin-bottom:8px;font-family:var(--font-mono);font-weight:500;
}
.lb-stat-card .val{
  font-family:var(--font-head);font-size:28px;font-weight:900;color:var(--c-acc);
  line-height:1;
}
@media(max-width:480px){
  .lb-row{padding:14px 16px;gap:12px}
  .lb-rank{font-size:16px}
  .lb-avatar{width:32px;height:32px;font-size:12px}
  .lb-username{font-size:13px}
  .lb-meta{font-size:10px}
  .lb-score{font-size:18px}
  .lb-tab{padding:7px 12px;font-size:12px}
}
</style>
</head>
<body>
<nav class="nav">
  <div class="container nav-inner">
    <a href="index.html" class="logo"><span class="logo-dot"></span>BrainPulse</a>
    <div class="nav-links">
      <a href="trainer.html">Кабинет</a>
      <a href="auth.html" id="authLink">Войти</a>
    </div>
    <a href="auth.html" class="nav-cta" id="navAuthBtn">Войти →</a>
  </div>
</nav>

<div class="container lb-shell">
  <div class="lb-head reveal">
    <div class="section-tag">// ЛИДЕРБОРД</div>
    <h1 style="font-size:clamp(32px,5vw,64px);margin-bottom:12px">Топ игроков</h1>
    <p style="color:var(--text-secondary);font-size:15px">Лучшие мозги. А ты где?</p>
  </div>

  <div class="lb-tabs" id="lbTabs">
    <button class="lb-tab active" data-ex="total">🏆 Общий</button>
    <button class="lb-tab" data-ex="accelerator">⚡ Ускор.</button>
    <button class="lb-tab" data-ex="expander">🧠 Память</button>
    <button class="lb-tab" data-ex="focus">🎯 Фокус</button>
    <button class="lb-tab" data-ex="grip">🔒 Цепк.</button>
    <button class="lb-tab" data-ex="reaction">💥 Реакц.</button>
    <button class="lb-tab" data-ex="pattern">🧬 Патт.</button>
    <button class="lb-tab" data-ex="nback">N-Back</button>
    <button class="lb-tab" data-ex="chess">♟️ Шахм.</button>
  </div>

  <div class="lb-stats-card" id="myStats"></div>
  <div class="lb-list" id="lbList">
    <div class="lb-loading">Загрузка...</div>
  </div>
</div>

<footer class="footer">
  <div class="container">
    <p>Обновляется автоматически каждые 60 сек</p>
  </div>
</footer>

<script src="js/utils.js"></script>
<script src="js/api.js"></script>
<script src="js/leaderboard.js"></script>
</body>
</html>
